version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cloudlabs_db
    restart: always
    environment:
      - POSTGRES_USER=dumar_admin
      - POSTGRES_PASSWORD=cloudlabs_secure_pass
      - POSTGRES_DB=cloudlabs_production
    ports:
      - "5444:5432" # Mapeado al 5444 para no chocar con tu Postgres actual
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: cloudlabs_app
    restart: always
    ports:
      - "8001:8000" # Accede vía http://[IP-DEL-SERVIDOR]:8001
    environment:
      - DATABASE_URL=postgresql://dumar_admin:cloudlabs_secure_pass@db:5432/cloudlabs_production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATA_DIR=/app/data
    depends_on:
      - db

volumes:
  postgres_data:
