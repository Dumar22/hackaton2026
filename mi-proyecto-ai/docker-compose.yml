services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai_project_db
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_project_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: ai_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://ai_user:password123@postgres:5432/ai_project_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_network
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  # React Frontend
  frontend:
    image: node:24-alpine
    container_name: ai_frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
    networks:
      - ai_network
    command: sh -c "corepack enable && pnpm install && pnpm exec vite --host 0.0.0.0 --port 3000"

volumes:
  postgres_data:

networks:
  ai_network:
    driver: bridge
